{% extends "base.html" %}

{% block title %}Matt Flathers{% endblock %}

{% set active_page = 'home' %}

{% block content %}
<div class="main-content">
    <div class="hero-section">
        <h1>Matt Flathers</h1>
    </div>
</div>
{% endblock %}

{% block extra_styles %}
<style>
    body, html {
        height: 100%;
        overflow: hidden;
    }

    .main-content {
        background-image: url('../static/images/home/IMG_4712.JPG');
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        align-items: center;
        overflow: hidden;
    }

    .hero-section {
        padding-left: 50px;
    }

    .hero-section h1 {
        font-size: 46px;
        color: #ffffff;
        text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        margin: 0;
    }
</style>
{% endblock %}

{% block extra_scripts %}
<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const images = [
            '20190817_065826308_iOS.jpg',
            '20190322_012125224_iOS.jpg',
            'DSC_0825.jpg',
            'IMG_6649.JPG',
            'IMG_4712.JPG',
        ];

        let currentIndex = 0;

        function changeBackground() {
            document.querySelector('.main-content').style.backgroundImage = `url('../static/images/home/${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }

        setInterval(changeBackground, 15000); // Change background every 15 seconds (15000 milliseconds)
    });
</script>
{% endblock %}
